<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Kindle Notes</title>
    <link href="https://fonts.googleapis.com/css?family=EB+Garamond:400,700|Oswald:400,700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <h1 class="header__heading">Kindle Notes</h1>
        <p class="header__subheading">manage your kindle higlights</p>
    </header>
    <main className="content">
        <form class="file-box">
            <div class="file-box__file-info">
                <button title="Remove file" id="remove-file" class="file-box__remove"></button>
                <div class="file-box__name"></div>
            </div>
            <label class="file-box__label" for="file">Choose a file</label><span> or drag it here</span>
            <input class="file-box__input" accept=".txt" id="file" type="file" />
        </form>
        <button class="button button--parse">Parse</button>
        <div class="result"></div>
    </main>
</body>
</html>
